version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: forklifts_db
    environment:
      POSTGRES_USER: forklifts
      POSTGRES_PASSWORD: forklifts_pass
      POSTGRES_DB: forklifts_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forklifts -d forklifts_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: forklifts_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://forklifts:forklifts_pass@db:5432/forklifts_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    container_name: forklifts_frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://backend:8000

volumes:
  pg_data:
